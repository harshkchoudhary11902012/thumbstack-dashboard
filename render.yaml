# Render Blueprint - deploy the API from the "server" folder
# Dashboard: https://dashboard.render.com → New → Blueprint → connect repo (this file will be detected)
services:
  - type: web
    name: thumbstack-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
